    <script>
        // Number of random hero images to display (adjust this value to change how many show)
        const HERO_IMAGES_TO_SHOW = 4;

        document.addEventListener('DOMContentLoaded', function() {
            const gallery = document.querySelector('.gallery');
            const images = Array.from(gallery.querySelectorAll('a'));

            // If there are fewer images than the display count, show all
            const displayCount = Math.min(HERO_IMAGES_TO_SHOW, images.length);

            // Shuffle array and select random images
            const shuffled = images.sort(() => Math.random() - 0.5);
            const selectedImages = shuffled.slice(0, displayCount);

            // Hide all images
            images.forEach(img => {
                img.style.display = 'none';
            });

            // Show only selected images
            selectedImages.forEach(img => {
                img.style.display = '';
            });
        });
    </script>
